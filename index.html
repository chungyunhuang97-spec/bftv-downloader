<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stream Grabber</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Bebas+Neue&display=swap');
:root {
  --bg:#0d0d18; --card:#13131f; --border:#1f1f38; --b2:#2c2c4a;
  --accent:#7c6fff; --glow:#a89fff; --green:#3ddc84;
  --red:#ff5c5c; --text:#e4e2f8; --muted:#58547a; --dim:#1c1c30;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;padding-bottom:60px}
.wrap{max-width:600px;margin:0 auto;padding:28px 16px}
h1{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:3px;line-height:1;margin-bottom:4px}
h1 em{color:var(--glow);font-style:normal}
.sub{font-size:11px;color:var(--muted);line-height:1.8;margin-bottom:22px}

.btn{display:block;width:100%;padding:15px;border:none;border-radius:2px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;
  margin-bottom:8px;text-align:center;-webkit-appearance:none}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:var(--glow)}
.btn-secondary{background:rgba(160,159,255,.1);color:var(--glow);border:1px solid rgba(160,159,255,.25)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:active{color:var(--text)}

textarea{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--b2);
  color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;
  padding:14px;resize:none;height:130px;outline:none;line-height:1.7;
  border-radius:2px;-webkit-appearance:none;display:block;margin-bottom:8px}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}

.err{background:rgba(255,92,92,.07);border:1px solid rgba(255,92,92,.25);
  color:var(--red);padding:12px 14px;font-size:11px;line-height:1.8;
  margin-bottom:8px;border-radius:2px}

.stream-card{background:var(--card);border:1px solid var(--b2);border-radius:2px;
  overflow:hidden;margin-bottom:10px}
.stream-card.best{border-color:var(--accent)}

.card-head{background:rgba(124,111,255,.08);padding:12px 16px;
  display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.card-q{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:var(--glow)}
.card-badge{font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);border:1px solid var(--b2);padding:2px 8px;border-radius:2px}
.best-tag{font-size:9px;letter-spacing:1px;color:var(--green);
  border:1px solid rgba(61,220,132,.3);padding:2px 8px;border-radius:2px;margin-left:auto}

.card-url{padding:10px 16px;font-size:10px;color:var(--muted);
  word-break:break-all;line-height:1.8;border-bottom:1px solid var(--border)}

.card-actions{padding:12px 16px;display:flex;flex-direction:column;gap:8px}

.action-btn{display:block;width:100%;padding:16px;border:none;border-radius:2px;
  font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;
  -webkit-appearance:none;text-decoration:none}
.action-btn:active{transform:scale(.97)}
.btn-m3u8go{background:var(--green);color:#111 !important;font-size:14px;padding:17px;display:block}
.btn-m3u8go:active{background:#2db86a}
.btn-copy-url{background:var(--dim);color:var(--muted);border:1px solid var(--b2)}
.btn-copy-url:active{border-color:var(--glow);color:var(--text)}
.btn-copy-url.ok{color:var(--green);border-color:rgba(61,220,132,.3)}

.hint{background:var(--dim);border:1px solid var(--b2);padding:12px 14px;
  font-size:11px;color:var(--muted);line-height:2.2;border-radius:2px;margin-bottom:14px}
.hint b{color:var(--text)}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--card);border:1px solid var(--glow);color:var(--glow);
  font-size:11px;padding:11px 20px;border-radius:2px;opacity:0;transition:all .25s;
  pointer-events:none;white-space:nowrap;z-index:999;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <h1>STREAM <em>GRAB</em></h1>
  <p class="sub">貼上 HTML → 自動找串流連結 → 複製後貼入 m3u8 Mpjex 下載</p>

  <!-- Phase A -->
  <div id="pa">
    <button class="btn btn-secondary" id="pasteBtn" type="button">📋 一鍵貼上原始碼</button>
    <textarea id="src" placeholder="或長按這裡手動貼上 HTML..."></textarea>
    <div class="err hidden" id="err">未找到串流連結，請確認已完整複製頁面 HTML。</div>
    <button class="btn btn-primary" id="scanBtn" type="button">🔍 分析串流連結</button>
    <button class="btn btn-ghost" id="clearBtn" type="button">清除</button>
  </div>

  <!-- Phase B -->
  <div id="pb" class="hidden">
    <div class="hint">
      <b>找到串流連結！已自動複製最高畫質</b><br>
      點「⬇ 用 m3u8go.cc 下載」直接開新分頁下載<br>
      或點「📋 複製連結」後貼入 m3u8 Mpjex
    </div>
    <div id="cards"></div>
    <button class="btn btn-ghost" id="backBtn" type="button">← 重新貼上</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  'use strict';
  var streams = [];
  function $id(id){ return document.getElementById(id); }

  function init(){
    $id('pasteBtn').addEventListener('click', doPaste);
    $id('scanBtn').addEventListener('click', doScan);
    $id('clearBtn').addEventListener('click', function(){ $id('src').value=''; $id('err').classList.add('hidden'); });
    $id('backBtn').addEventListener('click', function(){ $id('pb').classList.add('hidden'); $id('pa').classList.remove('hidden'); });
  }
  if(document.readyState==='loading'){ document.addEventListener('DOMContentLoaded',init); } else { init(); }

  async function doPaste(){
    try{
      var t = await navigator.clipboard.readText();
      if(!t.trim()){ showToast('剪貼簿是空的'); return; }
      $id('src').value = t;
      showToast('已貼上 '+Math.round(t.length/1000)+'KB');
    }catch(e){ showToast('請長按輸入框手動貼上'); }
  }

  function doScan(){
    var html = $id('src').value;
    $id('err').classList.add('hidden');
    if(!html.trim()){ showToast('請先貼上 HTML'); return; }
    var found = extract(html);
    if(!found.length){ $id('err').classList.remove('hidden'); return; }
    streams = found.slice(0,4);
    renderCards(streams);
    copyUrl(streams[0].url);
    showToast('✓ 已自動複製最高畫質連結！');
  }

  function extract(html){
    var results=[], seen={};
    var re1=/\{"src":"(https:[^"]+\.mp4[^"]*)"[^}]{0,200}?"desc":"([^"]+)"/g, m;
    while((m=re1.exec(html))!==null){
      var url=m[1].replace(/\\\//g,'/'), desc=m[2].toUpperCase();
      if(!seen[url]){ seen[url]=1; results.push({url:url,quality:desc,score:qScore(desc),type:'HLS'}); }
    }
    if(!results.length){
      var clean=html.replace(/\\u002[Ff]/g,'/').replace(/\\\//g,'/');
      var re2=/["'`](https?:\/\/[^"'`\s<>]{20,}\.(?:mp4|m3u8)[^"'`\s<>]*)/gi;
      while((m=re2.exec(clean))!==null){
        var u=m[1].replace(/[,;)}\]\\]+$/,'').trim();
        if(!u.startsWith('http')||seen[u]) continue;
        if(/thumb|poster|\.jpg|\.png/i.test(u)) continue;
        seen[u]=1; var q=guessQ(u);
        results.push({url:u,quality:q,score:qScore(q),type:'HLS/MP4'});
      }
    }
    results.sort(function(a,b){return a.score-b.score;});
    var byQ={},out=[];
    results.forEach(function(r){if(!byQ[r.quality]){byQ[r.quality]=1;out.push(r);}});
    return out;
  }

  function guessQ(url){
    if(/\/hd_/.test(url)) return '1080P';
    if(/\/hq_/.test(url)) return '720P';
    if(/\/m_[a-z0-9]/.test(url)) return '480P';
    if(/\/lq_/.test(url)) return '360P';
    var m=url.match(/[_\-\/](2160|1080|720|480|360|240)[pP]?(?=[_\-\/\.\?]|$)/);
    if(m) return m[1]+'P';
    return 'STREAM';
  }
  function qScore(q){ return{'4K':0,'2160P':0,'1080P':1,'720P':2,'480P':3,'360P':4,'240P':5,'STREAM':6}[q]||7; }

  function renderCards(list){
    $id('pa').classList.add('hidden');
    $id('pb').classList.remove('hidden');
    var wrap=$id('cards'); wrap.innerHTML='';
    list.forEach(function(s,i){
      var card=document.createElement('div');
      card.className='stream-card'+(i===0?' best':'');
      var m3u8goUrl='https://m3u8go.cc/en/downloader?url='+encodeURIComponent(s.url);
      card.innerHTML=[
        '<div class="card-head">',
          '<span class="card-q">',s.quality,'</span>',
          '<span class="card-badge">',s.type,'</span>',
          i===0?'<span class="best-tag">最高畫質 ✓</span>':'',
        '</div>',
        '<div class="card-url">',s.url,'</div>',
        '<div class="card-actions">',
          '<a class="action-btn btn-m3u8go" href="',m3u8goUrl,'" target="_blank">⬇ 用 m3u8go.cc 下載</a>',
          '<button class="action-btn btn-copy-url" type="button">📋 複製連結</button>',
        '</div>'
      ].join('');
      var copyBtn=card.querySelector('.btn-copy-url');
      (function(btn, url, quality){
        btn.addEventListener('click', function(){
          copyUrl(url);
          btn.textContent='✓ 已複製！'; btn.classList.add('ok');
          setTimeout(function(){ btn.innerHTML='📋 複製連結'; btn.classList.remove('ok'); },2500);
          showToast('已複製 '+quality+' 連結');
        });
      })(copyBtn, s.url, s.quality);
      wrap.appendChild(card);
    });
  }

  function copyUrl(text){
    if(!text) return;
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(function(){fbCopy(text);});
    } else { fbCopy(text); }
  }
  function fbCopy(text){
    var ta=document.createElement('textarea');
    ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0;width:1px;height:1px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{document.execCommand('copy');}catch(e){}
    document.body.removeChild(ta);
  }

  var tt;
  function showToast(msg){
    var t=$id('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(tt); tt=setTimeout(function(){t.classList.remove('show');},2800);
  }
})();
</script>
</body>
</html>
